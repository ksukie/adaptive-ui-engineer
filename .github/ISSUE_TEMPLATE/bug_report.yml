name: Bug report
description: Report incorrect Skill behavior, auditor output, packaging, or documentation.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private source code, or vulnerability details.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Skill workflow
        - Static auditor
        - Codex plugin packaging
        - Documentation
        - CI or tests
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the command or prompt, a minimal public fixture, and observed output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python version, agent client, framework, and browser where relevant.
    validations:
      required: true
