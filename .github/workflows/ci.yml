name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

jobs:
  python-tests:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.9"
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: windows-latest
            python: "3.11"
          - os: macos-latest
            python: "3.11"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  agent-skill-spec:
    name: Agent Skills specification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install hashed validator dependencies
        run: >-
          python -m pip install --no-cache-dir --only-binary=:all:
          --require-hashes -r .github/requirements/skills-ref.txt
      - name: Validate AdaptiveUI-S with the pinned Agent Skills reference validator
        run: >-
          python .github/scripts/run_skills_ref.py
          plugins/adaptiveui-skill/skills/adaptiveui-s
      - name: Validate AdaptiveUI-N with the pinned Agent Skills reference validator
        run: >-
          python .github/scripts/run_skills_ref.py
          plugins/adaptiveui-skill/skills/adaptiveui-n
      - name: Validate package and report-schema contracts
        run: python -m unittest tests.test_package tests.test_report_schema -v
